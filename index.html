<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>...</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
    background:#0a0a0a;
    color:#fff;
    overflow-x:hidden;
}

/* INTRO */
.intro {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.intro h1 { opacity:0.8; margin-bottom:30px; }

.intro button {
    padding:12px 30px;
    border-radius:30px;
    border:1px solid #fff;
    background:transparent;
    color:white;
    cursor:pointer;
}

/* CONTEÚDO */
.container {
    display:none;
    max-width:700px;
    margin:auto;
    padding:80px 20px;
    text-align:center;
}

.nome { font-size:2.2rem; margin-bottom:10px; }
.contador { opacity:0.5; margin-bottom:20px; }

.texto { opacity:0.6; line-height:1.7; }

.linha {
    width:50px;
    height:1px;
    background:#fff;
    margin:30px auto;
    opacity:0.2;
}

.botao {
    margin-top:40px;
    padding:12px 30px;
    border-radius:30px;
    border:1px solid #fff;
    background:transparent;
    color:white;
    cursor:pointer;
}

/* SURPRESA */
.surpresa { display:none; margin-top:40px; }

.data { font-size:2rem; }

.qr img { width:180px; }

/* CORAÇÕES */
.heart {
    position:fixed;
    bottom:-10px;
    width:12px;
    height:12px;
    background:white;
    transform:rotate(45deg);
    opacity:0.15;
    animation:subir 8s linear infinite;
}

.heart::before,
.heart::after {
    content:"";
    position:absolute;
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
}

.heart::before { top:-6px; }
.heart::after { left:-6px; }

@keyframes subir {
    100% {
        transform:translateY(-100vh) rotate(45deg);
        opacity:0;
    }
}

/* BOTÃO SOM */
.sound {
    position:fixed;
    bottom:20px;
    right:20px;
    border:1px solid #fff;
    padding:10px 15px;
    border-radius:30px;
    cursor:pointer;
    opacity:0.6;
}
</style>
</head>

<body>

<div class="intro" id="intro">
    <h1>abre quando estiver pronta</h1>
    <button onclick="start()">abrir</button>
</div>

<div class="container" id="conteudo">

    <div class="nome">Julie Gabrielly</div>
    <div class="contador" id="contador"></div>

    <div class="texto">
        Eu não queria fazer algo comum.<br>
        Então pensei em algo só nosso.
    </div>

    <div class="linha"></div>

    <div class="texto">
        Não precisa entender agora.<br>
        Só confia em mim mais uma vez.
    </div>

    <button class="botao" onclick="revelar()">continuar</button>

    <div class="surpresa" id="surpresa">

        <div class="linha"></div>

        <div class="data">18 · 04 · 2026</div>
        <p>22:00</p>

        <div class="linha"></div>

        <p>coloque sua melhor roupa.</p>

        <div class="qr">
            <p>escaneia antes 🎧</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://youtu.be/bnat4XDnQqY">
        </div>

    </div>

</div>

<div class="sound" onclick="toggleAudio()">som</div>

<!-- YOUTUBE INVISÍVEL -->
<iframe id="ytplayer"
width="0" height="0"
src="https://www.youtube.com/embed/bnat4XDnQqY?enablejsapi=1&loop=1&playlist=bnat4XDnQqY"
allow="autoplay">
</iframe>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let tocando = false;
let coracoesAtivos = false;

// YOUTUBE
function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer');
}

// START
function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
    if (player) player.playVideo();
}

// SOM
function toggleAudio() {
    if (!player) return;

    if (tocando) {
        player.pauseVideo();
        tocando = false;
    } else {
        player.playVideo();
        tocando = true;
    }
}

// SURPRESA
function revelar() {
    document.getElementById("surpresa").style.display = "block";

    if (!coracoesAtivos) {
        setInterval(criarCoracao, 400);
        coracoesAtivos = true;
    }
}

// CONTADOR
const inicio = new Date("2024-06-20");

function atualizarContador() {
    const dias = Math.floor((new Date() - inicio) / (1000*60*60*24));
    document.getElementById("contador").innerText =
        dias + " dias com você";
}

setInterval(atualizarContador, 1000);
atualizarContador();

// CORAÇÕES
function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 9000);
}
</script>

</body>
</html>
